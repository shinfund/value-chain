<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Value-chain · 2026</title>
<!-- [개선] @import 렌더 블로킹 제거 → <link preload> + <link stylesheet> 방식으로 교체 -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"></noscript>
<style>
:root{
  --sky:#378ADD; --sky50:#E6F1FB; --sky100:#B5D4F4; --sky600:#185FA5; --sky800:#0C447C;
  --teal:#1D9E75; --teal50:#E1F5EE; --teal800:#085041;
  --coral:#D85A30; --coral50:#FAECE7; --coral800:#712B13;
  --amber:#BA7517; --amber50:#FAEEDA; --amber800:#633806;
  --green:#639922; --green50:#EAF3DE; --green800:#27500A;
  --purple:#534AB7; --purple50:#EEEDFE; --purple800:#3C3489;
  --gray50:#F1EFE8; --gray600:#5F5E5A;
  --bg:#F5F8FF; --card:#FFFFFF; --border:#E0EAF5; --border2:#EBF3FF;
  --txt:#1A2535; --txt2:#3D4F68; --txt3:#6B7E99;
  --r8:8px; --r12:12px; --r14:14px; --r16:16px; --r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
  --shadow-hover:0 6px 24px rgba(55,138,221,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  font-size:15px; line-height:1.7; word-break:keep-all;
  color:var(--txt); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1100px; margin:0 auto; min-height:100dvh;}

/* 헤더+네비 — position:fixed 로 모든 브라우저 확실 고정 */
.hdr-wrap{
  position:fixed; top:0; left:0; right:0; z-index:50;
}
/* ── HEADER (연장근무앱 동일 구조) ── */
.header{
  background:var(--sky800);
  padding:max(13px,env(safe-area-inset-top)) 16px 13px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 12px rgba(12,68,124,.25);
}
.header-left{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.logo-mark{
  width:38px; height:38px; background:rgba(255,255,255,.15);
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.logo-title{font-size:17px; font-weight:700; color:#fff; letter-spacing:-.02em;}
.logo-sub{font-size:12px; color:rgba(255,255,255,.8);}
.last-update{font-size:11px; color:rgba(255,255,255,.75);}

/* ── 헤더 액션 버튼 (설정·새로고침) ── */
.header-right{display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0;}
.header-btns{display:flex; gap:7px;}
.hdr-btn{
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.35);
  color:#fff; border-radius:18px; padding:5px 13px;
  font-size:13px; font-family:inherit; cursor:pointer;
  display:flex; align-items:center; gap:4px; min-height:32px;
  -webkit-tap-highlight-color:transparent; transition:.18s;
}
.hdr-btn:hover{background:rgba(255,255,255,.25);}
.hdr-btn:disabled{opacity:.4; cursor:not-allowed;}
.hdr-btn-dot{
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  background:#6EE7B7; /* 연결됨=초록 */
}
.hdr-btn-dot.off{background:#FCA5A5;} /* 미연결=빨강 */
@keyframes spin-icon{to{transform:rotate(360deg)}}
.spinning{animation:spin-icon .8s linear infinite; display:inline-block;}

/* ── 설정 모달 ── */
/* ── CFG MODAL ── */
#cfgModal{display:none;}
#cfgModal.modal-open{
  display:block; position:fixed; inset:0;
  background:rgba(0,0,0,.55); z-index:9000;
}
.modal-backdrop{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center; padding:18px;
}
.modal-box{
  background:var(--card); border-radius:var(--r20); padding:24px;
  width:100%; max-width:440px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-title{
  font-size:16px; font-weight:700; color:var(--txt);
  margin-bottom:18px; display:flex; align-items:center; gap:7px;
}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:13px; font-weight:700; color:var(--txt2); margin-bottom:6px; display:block;}
.modal-input{
  width:100%; background:var(--bg); border:1.5px solid var(--border);
  border-radius:var(--r8); padding:10px 12px; font-size:15px;
  font-family:inherit; color:var(--txt); outline:none; transition:border .18s;
  box-sizing:border-box;
}
.modal-input:focus{border-color:var(--sky); background:#fff;}
.modal-hint{font-size:12px; color:var(--txt3); margin-top:4px; line-height:1.6;}
.modal-btns{display:flex; gap:8px; justify-content:flex-end; margin-top:16px;}
.modal-save{
  background:var(--sky); border:none; color:#fff;
  border-radius:var(--r8); padding:10px 20px;
  font-size:14px; font-weight:700; cursor:pointer;
  font-family:inherit; min-height:40px;
}
.modal-save:hover{background:var(--sky600);}
.modal-cancel{
  background:var(--bg); border:1.5px solid var(--border);
  color:var(--txt2); border-radius:var(--r8);
  padding:10px 20px; font-size:14px; font-weight:600;
  cursor:pointer; font-family:inherit; min-height:40px;
}
/* 모바일: 하단 시트 */
@media(max-width:480px){
  .modal-backdrop{align-items:flex-end; padding:0;}
  .modal-box{border-radius:var(--r20) var(--r20) 0 0; max-width:100%;}
}

/* ── 토스트 ── */
#toast{
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:#0D1520; color:#fff; padding:9px 18px;
  border-radius:20px; font-size:13px; font-weight:600;
  z-index:9999; transition:.3s; opacity:0; pointer-events:none; white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0); opacity:1;}

/* 탭 네비 래퍼 (스크롤 버튼 포함) */
.nav-scroll-wrap{
  display:flex; align-items:stretch; background:#fff;
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 8px rgba(55,138,221,.10);
  position:relative;
}
.nav-arrow{
  flex-shrink:0; width:32px; border:none; background:#fff;
  color:var(--txt3); font-size:20px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:color .15s, background .15s;
  -webkit-tap-highlight-color:transparent;
  z-index:1;
}
.nav-arrow:hover{color:var(--sky800); background:var(--sky50);}
.nav-arrow:disabled{opacity:.25; cursor:default;}
/* 탭 네비 */
.top-nav{
  flex:1; min-width:0;
  background:#fff;
  display:flex; gap:2px; overflow-x:auto; padding:4px 4px;
  scrollbar-width:none;
}
.top-nav::-webkit-scrollbar{display:none}
.nav-tab{
  flex-shrink:0; min-height:40px; padding:6px 12px;
  border:none; background:transparent; cursor:pointer;
  font-size:12.5px; font-weight:700; color:var(--txt3);
  font-family:inherit; border-radius:var(--r12);
  display:flex; align-items:center; gap:5px;
  transition:all .15s; -webkit-tap-highlight-color:transparent;
}
.nav-tab.on{background:var(--sky50); color:var(--sky800)}
.nav-tab:focus-visible{outline:2px solid var(--sky); outline-offset:1px}
.nav-tab .cnt{display:none;}
.nav-tab.fav-tab .cnt{
  display:inline-flex; align-items:center; justify-content:center;
  vertical-align:middle; font-size:11px; font-weight:800;
  padding:1px 6px; border-radius:20px; line-height:1.4; min-width:18px;
}

/* 메인 — fixed 헤더 높이만큼 padding-top은 JS가 동적으로 설정 */
.main{padding:16px 14px 60px}
@media(min-width:769px){.main{padding:22px 20px 80px}}

/* 분야 인트로 */
.intro{
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r16); padding:16px 18px; margin-bottom:18px;
  box-shadow:var(--shadow); animation:fadeIn .3s ease;
}
.intro h2{font-size:17px; font-weight:800; display:flex; align-items:center; gap:8px}
.intro .desc{font-size:14px; color:var(--txt); margin-top:8px; line-height:1.75; font-weight:400; letter-spacing:-.01em}
.intro .desc ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:3px;}
.intro .desc li{display:flex; align-items:baseline; gap:6px; font-size:14px; line-height:1.7;}
.intro .desc li::before{content:'•'; color:var(--sky600); font-size:15px; flex-shrink:0; font-weight:900; line-height:1.5;}
.intro .strength{
  margin-top:10px; padding:8px 12px 9px; border-radius:var(--r12);
  font-size:12.5px; font-weight:600; display:flex; flex-direction:column; gap:5px;
}
.intro .strength.pos{background:var(--teal50); color:var(--teal800)}
.intro .strength.warn{background:var(--amber50); color:var(--amber800)}
.strength-label{font-size:12.5px; font-weight:600; letter-spacing:.01em; line-height:1.65;}
.intro .strength ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px;}
.intro .strength li{display:flex; align-items:baseline; gap:5px; font-size:12.5px; line-height:1.65;}
.intro .strength li::before{content:'•'; font-size:13px; flex-shrink:0; font-weight:900; line-height:1.5; opacity:.75;}

/* 밸류체인 단계 */
.stage{margin-bottom:22px; animation:fadeIn .35s ease}
.stage-hd{
  display:flex; align-items:center; gap:10px; margin-bottom:11px;
}
.stage-num{
  flex-shrink:0; width:30px; height:30px; border-radius:9px;
  background:var(--sky); color:#fff; font-weight:900; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  align-self:center;
}
.stage-title{font-size:15.5px; font-weight:800; line-height:1.3;}
.stage-sub{font-size:12px; color:var(--txt2); font-weight:600; margin-top:2px; letter-spacing:-.01em;}
/* 종목 카드 그리드 */
.grid{display:grid; grid-template-columns:1fr; gap:9px}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}

.stock{
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r14); padding:13px 14px;
  box-shadow:var(--shadow); transition:transform .18s,box-shadow .18s;
  cursor:default;
}
.stock:hover{transform:translateY(-2px); box-shadow:var(--shadow-hover)}
.stock-top{display:flex; align-items:center; justify-content:space-between; gap:6px}
.stock-name{font-size:14.5px; font-weight:800; color:var(--txt); display:flex; align-items:center; gap:5px}
.stock-link{text-decoration:none; color:var(--txt); cursor:pointer;}
.stock-link:hover .stock-link-icon{opacity:1;}
.stock-link:hover{color:var(--sky600);}
.stock-link-icon{font-size:11px; color:var(--sky600); opacity:0.45; transition:opacity .15s; flex-shrink:0;}
.lead{
  font-size:11px; font-weight:800; padding:2px 9px; border-radius:20px;
  flex-shrink:0; letter-spacing:.04em;
}
.lead.t1{background:var(--coral); color:#fff}
.lead.t2{background:var(--sky); color:#fff}
.lead.t3{background:#8B96A8; color:#fff}
.stock-desc{font-size:13.5px; color:var(--txt); margin-top:7px; line-height:1.7; font-weight:400; letter-spacing:-.01em}
.stock-desc ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px;}
.stock-desc li{display:flex; align-items:baseline; gap:6px; font-size:13px; line-height:1.65;}
.stock-desc li::before{content:'•'; color:var(--sky600); font-size:14px; flex-shrink:0; font-weight:900; line-height:1.5;}
@media(min-width:960px){.stock-desc li{font-size:13.5px;}}

/* 디스클레이머 */
.disc{
  margin-top:20px; padding:12px 15px; border-radius:var(--r12);
  background:var(--amber50); color:var(--amber800);
  font-size:12px; line-height:1.65; font-weight:500;
}
.disc b{font-weight:800}


/* ── 리스크 텍스트 강조 ── */
.stock-desc .risk{
  display:block; margin-top:5px;
  font-size:12.5px; color:var(--amber800); font-weight:600;
  background:var(--amber50); border-radius:6px; padding:6px 10px;
  line-height:1.6;
}
.stock-desc .risk-label{font-size:12.5px; font-weight:700; display:block; margin-bottom:3px;}
.stock-desc .risk ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px;}
.stock-desc .risk li{display:flex; align-items:baseline; gap:6px; line-height:1.65; font-size:12.5px;}
.stock-desc .risk li::before{content:'•'; color:var(--amber); font-size:13px; flex-shrink:0; font-weight:900; line-height:1.6;}

/* ── 용어 해설 토글 ── */
.glossary-wrap{
  margin-top:10px; border-top:1px solid var(--border2);
}
.glossary-btn{
  width:100%; border:none; background:transparent; cursor:pointer;
  font-size:12.5px; font-weight:700; color:var(--sky600);
  font-family:inherit; padding:8px 0 4px;
  display:flex; align-items:center; gap:5px;
  -webkit-tap-highlight-color:transparent; transition:color .15s;
  text-align:left;
}
.glossary-btn:hover{color:var(--sky800);}
.glossary-btn .g-arrow{font-size:10px; transition:transform .22s; display:inline-block;}
.glossary-btn.open .g-arrow{transform:rotate(180deg);}
.glossary-body{
  overflow:hidden; max-height:0; transition:max-height .3s ease;
}
.glossary-body.open{max-height:1000px;}
.glossary-list{
  padding:8px 0 6px; display:flex; flex-direction:column; gap:7px;
}
.glossary-item{
  display:flex; flex-direction:column; gap:3px;
  padding:8px 11px; border-radius:var(--r8);
  background:var(--sky50);
}
.glossary-term{
  font-size:13px; font-weight:800;
  color:var(--sky800); line-height:1.4; letter-spacing:.01em;
}
.glossary-def{
  font-size:13px; color:var(--txt); font-weight:500;
  line-height:1.7;
}

/* ── 업데이트 날짜 ── */
.stock-date{
  font-size:12px; color:var(--txt2); font-weight:600;
  margin-top:6px; display:flex; align-items:center; gap:5px;
}
.stock-date-dot{
  width:6px; height:6px; border-radius:50%; background:var(--teal); opacity:.8; flex-shrink:0;
}
.stock-date.recent .stock-date-dot{background:var(--teal); opacity:1;}
.stock-date.old .stock-date-dot{background:var(--gray600); opacity:.6;}

/* ── 이력 보기 버튼 ── */
.hist-btn{
  margin-left:auto; border:none; background:transparent; cursor:pointer;
  font-size:11.5px; color:var(--sky600); font-weight:700; padding:2px 6px;
  -webkit-tap-highlight-color:transparent; line-height:1;
  display:flex; align-items:center; gap:3px; transition:color .15s;
  white-space:nowrap; background:var(--sky50); border-radius:20px;
}
.hist-btn:hover{color:var(--sky800); background:var(--sky100);}
.hist-btn .hist-arrow{font-size:10px; transition:transform .2s; display:inline-block;}
.hist-btn.open .hist-arrow{transform:rotate(180deg);}

/* ── 이력 드롭다운 ── */
.hist-wrap{
  overflow:hidden; max-height:0; transition:max-height .28s ease;
}
.hist-wrap.open{max-height:2000px;}
.hist-list{
  margin-top:7px; padding:8px 10px 6px;
  background:var(--gray50); border-radius:var(--r8);
  border-left:3px solid var(--border);
}
.hist-item{
  display:flex; flex-direction:column; gap:4px; padding:7px 0;
  border-bottom:1px solid var(--border2); font-size:12px;
}
.hist-item:last-child{border-bottom:none; padding-bottom:2px;}
.hist-date{
  font-weight:800; color:var(--txt2); font-size:12.5px;
  line-height:1.4; display:flex; align-items:center; gap:5px;
}
.hist-date::before{content:'🕐'; font-size:11px; opacity:.7;}
.hist-date.hl{color:var(--teal);}
.hist-date.hl::before{color:var(--teal); opacity:1;}
.hist-body{color:var(--txt); line-height:1.7; font-weight:500;}
.hist-body ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:3px;}
.hist-body li{display:flex; align-items:baseline; gap:5px; font-size:13px; line-height:1.7;}
.hist-body li::before{content:'•'; color:var(--sky600); font-size:13px; flex-shrink:0; font-weight:900; line-height:1.6;}
.hist-body .hist-risk{
  display:block; margin-top:5px;
  font-size:13px; color:var(--amber800); font-weight:600;
  background:var(--amber50); border-radius:6px; padding:6px 10px;
  line-height:1.7;
}
.hist-body .hist-risk ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:3px;}
.hist-body .hist-risk li{display:flex; align-items:baseline; gap:5px; font-size:13px; line-height:1.7;}
.hist-body .hist-risk li::before{content:'•'; color:var(--amber); font-size:13px; flex-shrink:0; font-weight:900; line-height:1.6;}


/* ── 핵심 종목 뱃지 ── */
.key-badge{
  font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px;
  background:linear-gradient(135deg,#6B3FA0,#9B5FD0);
  color:#fff; letter-spacing:.03em; flex-shrink:0;
}
.stock-key{
  border-color:var(--coral50);
  box-shadow:0 2px 12px rgba(216,90,48,.12);
}
.stock-key:hover{
  box-shadow:0 6px 24px rgba(216,90,48,.2);
}

/* ── 즐겨찾기 버튼 (카드 우측 상단) ── */
.fav-btn{
  flex-shrink:0; border:none; background:transparent; cursor:pointer;
  font-size:18px; line-height:1; padding:2px 0 2px 4px;
  -webkit-tap-highlight-color:transparent; transition:transform .15s;
  color:#ccc;
}
.fav-btn:hover{transform:scale(1.2);}
.fav-btn.on{color:#f5a623;}

/* ── 즐겨찾기 탭 패널 ── */
#fav-panel{display:none; animation:fadeIn .2s ease;}
#fav-panel.vis{display:block;}
.fav-empty{
  text-align:center; padding:50px 20px;
  font-size:14px; color:var(--txt3); font-weight:600; line-height:2;
}


.fav-order-hint{
  font-size:11.5px; color:var(--txt3); text-align:right;
  margin-bottom:8px; font-weight:600;
}
.fav-move-btn{
  border:none; background:transparent; color:var(--txt3);
  padding:0 4px; cursor:pointer; font-size:12px; line-height:1;
  -webkit-tap-highlight-color:transparent; transition:color .12s;
  min-height:24px; min-width:24px; border-radius:4px;
}
.fav-move-btn:active{color:var(--sky);}
.fav-move-btn:disabled{opacity:.2; cursor:default;}
.fav-item-row{ margin-bottom:9px; }
.fav-card-footer{
  display:flex; justify-content:flex-end; align-items:center;
  gap:2px; margin-top:6px; padding-top:6px;
  border-top:1px solid var(--border2);
}
.fav-card-footer-label{
  font-size:11px; color:var(--txt3); margin-right:auto; font-weight:500;
}
/* ── 즐겨찾기 카드 (search-result-item) ── */
.search-result-item{
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r14); padding:13px 14px;
  box-shadow:var(--shadow);
}
.search-result-meta{
  display:flex; gap:6px; align-items:center; margin-bottom:8px;
}
.tab-badge{
  font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:20px;
  background:linear-gradient(135deg,var(--sky600),var(--sky));
  color:#fff; letter-spacing:.03em;
}
.stage-badge{
  font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:20px;
  background:var(--sky50); color:var(--sky800); letter-spacing:.02em;
}

/* ── 즐겨찾기 탭 버튼 (네비 특별 처리) ── */
.nav-tab.fav-tab{color:var(--amber800);}
.nav-tab.fav-tab.on{background:var(--amber50); color:var(--amber800);}
.nav-tab.fav-tab .cnt{background:var(--amber50); color:var(--amber800);}
.nav-tab.fav-tab.on .cnt{background:#f5a623; color:#fff;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.hidden{display:none}

/* ══════════════════════════════
   홈 그리드 패널
══════════════════════════════ */
#home-panel{animation:fadeIn .25s ease;}
#home-panel.hidden{display:none;}
.home-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  margin-top:4px;
}
@media(min-width:640px){.home-grid{grid-template-columns:1fr 1fr 1fr;}}
@media(min-width:960px){.home-grid{grid-template-columns:1fr 1fr 1fr 1fr;}}

.home-card{
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--r14); padding:14px 14px 12px;
  cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s;
  -webkit-tap-highlight-color:transparent;
  display:flex; flex-direction:column; gap:5px;
}
.home-card:hover{transform:translateY(-2px); box-shadow:var(--shadow-hover); border-color:var(--sky100);}
.home-card:active{transform:scale(.97);}
.home-card:focus-visible{outline:2px solid var(--sky); outline-offset:2px;}

.home-card-top{
  display:flex; align-items:center; justify-content:space-between; gap:4px;
  margin-bottom:2px;
}
.home-card-icon{font-size:22px; line-height:1;}
.home-card-name{font-size:13.5px; font-weight:800; color:var(--txt); line-height:1.3;}
.home-card-status{display:flex; align-items:center; gap:5px; margin-top:2px;}
.home-card-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.home-card-dot.pos{background:var(--teal);}
.home-card-dot.warn{background:#f5a623;}
.home-card-label{font-size:11.5px; font-weight:600; color:var(--txt3);}
.home-card-cnt{
  margin-left:auto; font-size:10.5px; font-weight:700;
  color:var(--sky600); background:var(--sky50);
  padding:1px 7px; border-radius:20px; white-space:nowrap;
}
.home-key-row{
  display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;
}
.home-key-name{
  font-size:10.5px; font-weight:700;
  color:var(--coral800); background:var(--coral50);
  padding:2px 7px; border-radius:20px; white-space:nowrap;
}
.home-upd{
  font-size:10px; font-weight:600; white-space:nowrap; flex-shrink:0;
}
.home-upd.recent{color:var(--teal);}
.home-upd.old{color:var(--txt3); opacity:.7;}

/* 홈 탭 버튼 */
.nav-tab.home-tab{color:var(--sky800);}
.nav-tab.home-tab.on{background:var(--sky50); color:var(--sky800);}

/* ── 홈 티어 필터 바 ── */
.home-filter-bar{
  display:flex; gap:7px; flex-wrap:wrap;
  margin-bottom:14px; align-items:center;
}
.home-filter-label{
  font-size:11.5px; font-weight:700; color:var(--txt3);
  margin-right:2px; white-space:nowrap; align-self:center;
}
.hf-btn{
  border:1.5px solid var(--border); background:var(--card);
  border-radius:20px; padding:5px 13px;
  font-size:12px; font-weight:700; cursor:pointer;
  color:var(--txt3); font-family:inherit;
  transition:all .15s; -webkit-tap-highlight-color:transparent;
  display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.hf-btn:hover{border-color:var(--sky100); color:var(--sky600);}
.hf-btn.on{border-color:transparent; color:#fff;}
.hf-btn.all.on{background:var(--sky); border-color:var(--sky);}
.hf-btn.t1.on{background:var(--coral); border-color:var(--coral);}
.hf-btn.t2.on{background:var(--sky600); border-color:var(--sky600);}
.hf-btn.t3.on{background:#8B96A8; border-color:#8B96A8;}
.hf-btn .hf-cnt{
  display:inline-flex; align-items:center; justify-content:center;
  vertical-align:middle; font-size:10.5px; font-weight:800;
  padding:1px 6px; border-radius:10px; line-height:1.4; min-width:18px;
  background:rgba(255,255,255,.25);
}
.hf-btn:not(.on) .hf-cnt{background:var(--sky50); color:var(--sky800);}
.hf-btn.t1:not(.on) .hf-cnt{background:var(--coral50); color:var(--coral800);}
.hf-btn.t2:not(.on) .hf-cnt{background:var(--sky50); color:var(--sky800);}
.hf-btn.t3:not(.on) .hf-cnt{background:var(--gray50); color:var(--txt3);}

/* 홈 카드 필터 숨김 */
.home-card.hf-hidden{display:none;}

/* 홈 필터 빈 상태 */
.home-filter-empty{
  grid-column:1/-1; text-align:center;
  padding:40px 20px; font-size:14px; color:var(--txt3); font-weight:600;
}

/* 섹터 진입 후 뒤로가기 버튼 */
.back-btn{
  display:inline-flex; align-items:center; gap:6px;
  border:none; background:transparent; cursor:pointer;
  font-size:13px; font-weight:700; color:var(--sky600);
  padding:0; margin-bottom:14px;
  -webkit-tap-highlight-color:transparent; transition:color .15s;
}
.back-btn:hover{color:var(--sky800);}
.back-btn-wrap{padding-top:2px;}

/* ===== 반응형 최적화 패치 ===== */

/* PC(≥960px): 탭 중앙 정렬, 패딩 확대 */
@media(min-width:960px){
  .top-nav{
    justify-content:center;
    overflow-x:visible;
    padding:6px 8px;
  }
  .nav-arrow{width:36px; font-size:22px;}
  .nav-tab{padding:8px 16px; font-size:13px;}
  .header{padding:14px 24px;}
  .logo-title{font-size:19px;}
  .intro .desc{font-size:14.5px;}
  .stock-desc{font-size:14px;}
}

/* 태블릿(560px~959px): 탭 스크롤 유지, 폰트 소폭 조정 */
@media(min-width:560px) and (max-width:959px){
  .nav-tab{padding:6px 11px; font-size:12px;}
}

/* 소형 모바일(≤380px): 탭 글자 잘림 방지, 카드 패딩 축소 */
@media(max-width:380px){
  .nav-tab{font-size:11px; padding:6px 8px; min-height:44px; letter-spacing:-.03em;}
  .logo-title{font-size:15px;}
  .logo-sub{font-size:10px;}
  .main{padding:12px 10px 60px;}
  .stock{padding:11px 12px;}
  .stock-name{font-size:13.5px;}
  .stock-desc{font-size:13px;}
  .intro{padding:13px 14px;}
  .intro h2{font-size:15px;}
  .intro .desc{font-size:13px;}
  .intro .desc li{font-size:13px;}
}

/* 모든 모바일(≤640px): 터치 타겟 44px, 인트로 desc 폰트 조정 */
@media(max-width:640px){
  .nav-tab{min-height:44px;}
  .intro .desc{font-size:13.5px;}
  .intro .desc li{font-size:13.5px;}
}

/* PC 헤더 */
@media(min-width:769px){
  .logo-title{font-size:18px;}
  .logo-sub{font-size:12px;}
}

// ── 앱 업데이트 날짜 단일 관리 ──
// DATA 전체 종목 중 가장 최신 upd를 자동 산출 → 헤더 날짜 한 곳만 수정하면 전체 반영

// XSS 방지: innerHTML 주입 전 이스케이프
// ── 리스크 구분자 전역 상수 (splitRisk·buildHistHTML 공용) ──
const RISK_MARK = '⚠️리스크:';
function esc(v){
  return String(v).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

// [버그 수정] tier를 숫자로 검증하여 안전하게 처리
function tierLabel(t){
  const tier = Number(t);
  if(tier === 1) return '<span class="lead t1">독보</span>';
  if(tier === 2) return '<span class="lead t2">선두</span>';
  return '<span class="lead t3">성장</span>';
}

// ── 섹터 총 종목 수 집계 헬퍼 ──
function countStocks(d){
  return d.stages.reduce((a, s) => a + s.stocks.length, 0);
}

// ── 섹터 내 가장 최근 upd 날짜 반환 헬퍼 (panelHTML·renderHomePanel 공용) ──
function getSectorLatestUpd(d){
  let latest = '';
  d.stages.forEach(s => s.stocks.forEach(st => {
    if(st.upd && (!latest || st.upd > latest)) latest = st.upd;
  }));
  return latest;
}

// ── [r2] 날짜 diff → 표시 label 공통 헬퍼 ──
// diff(일수)와 label(표시 텍스트)을 함께 반환 — updDateHTML·renderHomePanel 공용
function dayDiffLabel(upd){
  const diff = Math.floor((new Date() - new Date(upd)) / 86400000);
  let label;
  if(diff === 0) label = '오늘';
  else if(diff <= 7) label = `${diff}일 전`;
  else label = upd.replace(/^\d{4}-(\d{2})-(\d{2})$/, (_, m, d) => m + '/' + d);
  return {diff, label};
}

// ── [r1] 리스크 파싱 공통 헬퍼 ── (메인 카드·즐겨찾기 공용) — 원문(raw) 기준
function splitRisk(raw, riskSpanClass){
  const idx = raw.indexOf(RISK_MARK);
  const main = (idx === -1 ? raw : raw.slice(0, idx)).trim();
  const risk = idx === -1 ? '' : raw.slice(idx + RISK_MARK.length).trim();
  const riskHTML = risk ? `<span class="${riskSpanClass}"><span class="risk-label">⚠️ 리스크</span>${riskToBullets(esc(risk))}</span>` : '';
  return mainToBullets(main) + riskHTML;
}

// ── 리스크 텍스트 → 불릿 목록 변환 ──
// ", " 기준으로 항목 분리, 2항목 이상일 때만 <ul> 적용
function riskToBullets(text){
  if(!text) return text;
  const raw = text
    .split(/,\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 0);
  if(raw.length < 2) return esc(text);
  const items = raw.map(s => `<li>${esc(s)}</li>`).join('');
  return `<ul>${items}</ul>`;
}


// ── 메인 설명 텍스트 → 불릿 목록 변환 ──
// ". " 기준으로 문장 분리, 2문장 이상일 때만 <ul> 적용
function mainToBullets(text){
  if(!text) return text;
  const raw = text
    .split(/(?:\.\s+(?=[A-Z가-힣0-9\'\"\`\[—\-])|·\s+)/)
    .map(s => s.replace(/\.$/, '').trim())
    .filter(s => s.length > 0);
  if(raw.length < 2) return esc(text);
  const items = raw.map(s => `<li>${esc(s)}</li>`).join('');
  return `<ul>${items}</ul>`;
}

// ── 업데이트 날짜 표시 헬퍼 ──
function updDateHTML(upd, hist, uid){
  if(!upd) return '';
  const {diff: diffDays, label} = dayDiffLabel(upd);
  const cls = diffDays <= 30 ? 'recent' : 'old';
  const hasHist = hist && hist.length > 0;
  const histBtn = hasHist
    ? `<button class="hist-btn" id="hbtn-${uid}" onclick="toggleHist('${uid}')" aria-expanded="false">이력 ${hist.length}건 <span class="hist-arrow">▼</span></button>`
    : '';
  const histHTML = hasHist ? buildHistHTML(hist) : '';
  return `<div class="stock-date ${cls}"><span class="stock-date-dot"></span>업데이트 ${esc(label)}${histBtn}</div>${hasHist ? `<div class="hist-wrap" id="hw-${uid}">${histHTML}</div>` : ''}`;
}

// ── 이력 HTML 생성 ──
function buildHistHTML(hist){
  const items = hist.map((h, i) => {
    const {label} = dayDiffLabel(h.upd);
    const isLatest = i === 0;
    // 이력 본문: 원문을 전달 — mainToBullets/riskToBullets 내부에서 esc() 처리
    const rawIdx = h.d.indexOf(RISK_MARK);
    const mainText = (rawIdx === -1 ? h.d : h.d.slice(0, rawIdx)).trim();
    const riskText = rawIdx === -1 ? '' : h.d.slice(rawIdx + RISK_MARK.length).trim();
    const mainHTML = mainToBullets(mainText);
    const riskHTML = riskText ? `<span class="hist-risk"><span style="font-size:11px;font-weight:700;">⚠️ 리스크</span> ${riskToBullets(riskText)}</span>` : '';
    return `<div class="hist-item">
      <span class="hist-date${isLatest?' hl':''}">${esc(label)}</span>
      <span class="hist-body">${mainHTML}${riskHTML}</span>
    </div>`;
  }).join('');
  return `<div class="hist-list">${items}</div>`;
}

// ── 드롭다운 공통 토글 헬퍼 ──
function toggleDropdown(bodyEl, btnEl){

}

// tabs / panels — rebuildApp() 실행 후 채워짐
const tabs = [], panels = [];

// ── rebuildApp: DATA 로드 후 호출 — 탭·패널·Map 재구성 ──
function rebuildApp(){
  // 기존 탭·패널 DOM 초기화 (재빌드 시 중복 방지)
  tabs.length = 0; panels.length = 0;
  // nav에서 섹터 탭만 제거 (홈·즐찾 특수탭 유지)
  Array.from(nav.querySelectorAll('.nav-tab:not(.home-tab):not(.fav-tab)')).forEach(b => b.remove());
  Array.from(content.children).forEach(p => p.remove());

  // Map 재구성
  DATA_MAP = new Map(DATA.map(d => [d.key, d]));
  STOCK_MAP = new Map();
  DATA.forEach(d => d.stages.forEach(s => s.stocks.forEach(st => {
    STOCK_MAP.set(st.n, {st, tabName: d.name, stageName: s.t});
  })));

  // 탭 버튼 + 패널 빌드
  DATA.forEach((d, i) => {
    const b = document.createElement('button');
    b.className = 'nav-tab';
    b.id = 'tab-' + d.key;
    b.type = 'button';
    b.setAttribute('role', 'tab');
    b.setAttribute('aria-controls', 'panel-' + d.key);
    b.setAttribute('aria-selected', 'false');
    b.tabIndex = -1;
    b.innerHTML = `<span>${esc(d.name)}</span>`;
    b.onclick = () => show(i);
    b.addEventListener('keydown', e => onKey(e, i));
    nav.appendChild(b);
    tabs.push(b);

    const p = document.createElement('div');
    p.id = 'panel-' + d.key;
    p.className = 'hidden';
    p.setAttribute('role', 'tabpanel');
    p.setAttribute('aria-labelledby', 'tab-' + d.key);
    p.setAttribute('aria-hidden', 'true');
    p.innerHTML = panelHTML(d);
    content.appendChild(p);
    panels.push(p);
  });

  // 즐겨찾기 동기화
  syncAllFavBtns();
  updateFavTab();

  // 홈으로 시작
  current = -1;
  showHomePanel();
  updateNavArrows();
}

let current = -1; // [버그 수정] show() 멱등성: -1로 초기화하여 첫 호출 항상 실행

function show(idx, focusTab) {
  // 멱등성 보장 — 이미 같은 탭이면 즉시 반환
  if (current === idx) return;
  current = idx;

  // 특수 탭·패널(즐겨찾기) 비활성화는 deactivateAll 공통 헬퍼 사용 (r2)
  deactivateAll();

  // content 영역 복원
  content.classList.remove('hidden');

  // 섹터 탭 활성화
  tabs.forEach((t, i) => {
    const on = i === idx;
    t.classList.toggle('on', on);
    t.setAttribute('aria-selected', on ? 'true' : 'false');
    t.tabIndex = on ? 0 : -1;
  });

  // panels: back-btn-wrap 제거 + hidden 토글 한 번에 처리
  panels.forEach((p, i) => {
    const bw = p.querySelector('.back-btn-wrap');
    if(bw) bw.remove();
    const on = i === idx;
    p.classList.toggle('hidden', !on);
    p.setAttribute('aria-hidden', on ? 'false' : 'true');
    if (on) p.tabIndex = 0;
    else p.removeAttribute('tabindex');
  });

  window.scrollTo({ top: 0, behavior: 'instant' });

  // 활성 탭이 nav 스크롤 영역 안에 보이도록 직접 스크롤
  (function scrollTabIntoNav(){
    const tab = tabs[idx];
    const navRect = nav.getBoundingClientRect();
    const tabRect = tab.getBoundingClientRect();
    const offset = tabRect.left - navRect.left + nav.scrollLeft - (nav.clientWidth / 2) + (tab.offsetWidth / 2);
    nav.scrollTo({ left: Math.max(0, offset), behavior: 'smooth' });
    onScrollEnd(nav, updateNavArrows);
  })();
  if (focusTab) tabs[idx].focus();

  // URL 해시 연동
  safeReplaceHash(DATA[idx].key);

  // 즐겨찾기 버튼 상태 동기화 (★/☆)
  syncAllFavBtns();
}

// 키보드 네비게이션: ←→, Home, End — nav 전체 탭 순환 (홈·관심 포함)
function onKey(e, idx) {
  if (e.key === 'ArrowDown') {
    // WAI-ARIA tablist 권고 — ArrowDown 시 활성 패널로 포커스 이동
    e.preventDefault();
    const panel = panels[idx];
    if(panel){
      panel.focus();
    } else {
      // 홈·관심 탭(panels 범위 밖) — 해당 패널 직접 참조
      const activeTab = document.querySelector('.nav-tab.on');
      if(activeTab){
        const tid = activeTab.id;
        const targetPanel = tid === 'tab-home' ? homePanel : tid === 'tab-fav' ? favPanel : null;
        if(targetPanel) targetPanel.focus();
      }
    }
    return;
  }
  const allTabs = Array.from(nav.querySelectorAll('.nav-tab'));
  const activeTab = document.getElementById('tab-' + DATA[idx].key);
  const curPos = allTabs.indexOf(activeTab);
  let nextPos = null;
  if (e.key === 'ArrowRight') nextPos = (curPos + 1) % allTabs.length;
  else if (e.key === 'ArrowLeft') nextPos = (curPos - 1 + allTabs.length) % allTabs.length;
  else if (e.key === 'Home') nextPos = 0;
  else if (e.key === 'End') nextPos = allTabs.length - 1;
  if (nextPos !== null) { e.preventDefault(); allTabs[nextPos].click(); allTabs[nextPos].focus(); }
}


window.addEventListener('hashchange', () => {
  const key = location.hash.slice(1);
  if(key === 'home' || !key){ showHomePanel(); return; }
  if(key === 'fav'){ showFavPanel(); return; }
  const i = DATA.findIndex(d => d.key === key);
  if(i >= 0 && i !== current) show(i);
});

    // 가장 최근 upd
    const latestUpd = getSectorLatestUpd(d);
    const {diff: updDiff, label: updLabel} = latestUpd ? dayDiffLabel(latestUpd) : {diff:99, label:''};
    const updCls = updDiff <= 7 ? 'home-upd recent' : 'home-upd old';

    // 필터 숨김 여부 — 초기 렌더 시 homeTierFilter 반영
    const hidden = (homeTierFilter !== 'all' && !sectorHasTier(d, Number(homeTierFilter))) ? ' hf-hidden' : '';

    return `<div class="home-card${hidden}" data-sector-key="${esc(d.key)}" onclick="showFromHome(${i})" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showFromHome(${i})}">
      <div class="home-card-top">
        <span class="home-card-icon">${esc(d.icon)}</span>
        <span class="${updCls}">↺ ${esc(updLabel)}</span>
      </div>
      <div class="home-card-name">${esc(d.name)}</div>
      <div class="home-card-status">
        <span class="home-card-dot ${sm.cls}"></span>
        <span class="home-card-label">${esc(sm.label)}</span>
        <span class="home-card-cnt">${stockCount}종목</span>
      </div>
      ${keyNames ? `<div class="home-key-row">${keyNames}</div>` : ''}
    </div>`;
  }).join('');

  // 필터 바 HTML
  const filterBar = buildHomeTierFilterBar();

  homePanel.innerHTML = filterBar + `<div class="home-grid" id="home-grid">${cards}</div>`;
}

function buildHomeTierFilterBar(){
  const cnt = {
    all: DATA.length,
    '1': countSectorsByTier('1'),
    '2': countSectorsByTier('2'),
    '3': countSectorsByTier('3'),
  };
  const btns = [
    {key:'all', cls:'all', label:'전체'},
    {key:'1',   cls:'t1',  label:'독보'},
    {key:'2',   cls:'t2',  label:'선두'},
    {key:'3',   cls:'t3',  label:'성장'},
  ].map(({key, cls, label}) => {
    const on = homeTierFilter === key ? ' on' : '';
    return `<button class="hf-btn ${cls}${on}" data-tier="${key}" onclick="applyHomeTierFilter('${key}')">${label}<span class="hf-cnt">${cnt[key]}</span></button>`;
  }).join('');
  return `<div class="home-filter-bar"><span class="home-filter-label">티어</span>${btns}</div>`;
}

function applyHomeTierFilter(tier){
  homeTierFilter = tier;
  // 필터 버튼 on 상태 갱신
  document.querySelectorAll('.hf-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.tier === tier);
  });
  // 카드 show/hide
  const grid = document.getElementById('home-grid');
  if(!grid) return;
  let visCount = 0;
  grid.querySelectorAll('.home-card').forEach(card => {
    const key = card.dataset.sectorKey;
    const d = DATA_MAP.get(key);
    const visible = tier === 'all' || (d && sectorHasTier(d, Number(tier)));
    card.classList.toggle('hf-hidden', !visible);
    if(visible) visCount++;
  });
  // 빈 상태 처리
  let emptyEl = grid.querySelector('.home-filter-empty');
  if(visCount === 0){
    if(!emptyEl){
      emptyEl = document.createElement('div');
      emptyEl.className = 'home-filter-empty';
      emptyEl.textContent = '해당 티어 종목이 없습니다.';
      grid.appendChild(emptyEl);
    }
  } else {
    if(emptyEl) emptyEl.remove();
  }
}

function getFavStocks(){
  // favIdx: 실제 favs 배열 인덱스 함께 반환 (moveFav 인덱스 불일치 방지)
  return favs.map((n, favIdx) => {

  }).filter(Boolean);

  const ni = idx + dir;
  if(ni < 0 || ni >= favs.length) return;
  const tmp = favs[idx]; favs[idx] = favs[ni]; favs[ni] = tmp;
  saveFavs(favs);
  renderFavPanel();
}

function renderFavPanel(){
  if(!favPanel.classList.contains('vis')) return;
  if(favs.length === 0){
    favPanel.innerHTML = '<div class="fav-empty">⭐ 관심종목이 없습니다.<br>카드 우측 ☆ 버튼으로 추가하세요.</div>';
    return;
  }
  const hint = favs.length > 1 ? '<div class="fav-order-hint">▲▼ 버튼으로 순서 변경</div>' : '';
  const total = favs.length;
  const items = getFavStocks().map(({st, tabName, stageName, favIdx}, i) => {
    const footer = total > 1 ? `<div class="fav-card-footer">
      <span class="fav-card-footer-label">${i+1} / ${total}</span>
      <button class="fav-move-btn" onclick="moveFav(${favIdx},-1)" ${favIdx===0?'disabled':''} aria-label="위로">▲ 위로</button>
      <button class="fav-move-btn" onclick="moveFav(${favIdx},1)" ${favIdx===favs.length-1?'disabled':''} aria-label="아래로">▼ 아래로</button>
    </div>` : '';
    return `<div class="fav-item-row">${favCardHTML(st, tabName, stageName, footer)}</div>`;
  }).join('');
  favPanel.innerHTML = hint + items;
}

// ── 마스킹 헬퍼 ──
function maskVal(v){
  if(!v) return '';
  if(v.startsWith('http')){
    try{
      const u=new URL(v); const h=u.hostname; const parts=h.split('.');
      const masked=parts[0].length>4
        ? parts[0].slice(0,2)+'XX'+parts[0].slice(-2)+'.'+parts.slice(1).join('.')
        : 'XX.'+parts.slice(1).join('.');
      return u.protocol+'//'+masked;
    }catch(e){ return v.slice(0,6)+'XX...XX'+v.slice(-4); }
  }
  if(/^[0-9a-f\-]{32,36}$/i.test(v)){
    const c=v.replace(/-/g,'');
    return c.slice(0,4)+'-XXXX-XXXX-XXXX-'+c.slice(-4);
  }
  return v.slice(0,3)+'XX...XX'+v.slice(-3);
}

// ── Notion API fetch 헬퍼 ──
async function fetchNotion(dbId, body){
  const res = await fetch(`${CFG.workerUrl}/v1/databases/${dbId}/query`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const ct = res.headers.get('content-type') || '';
  if(!ct.includes('application/json'))
    throw new Error('Worker URL 오류 — JSON이 아닌 응답');
  return res.json();
}

// ── 전체 페이지 조회 (페이지네이션) ──
async function fetchAllPages(dbId, sorts){
  const body = { page_size: 100 };
  if(sorts) body.sorts = sorts;
  const data = await fetchNotion(dbId, body);
  let pages = data.results || [];
  let cursor = data.next_cursor, hasMore = data.has_more, cnt = 0;
  while(cursor && hasMore && ++cnt < 20){
    const d2 = await fetchNotion(dbId, {...body, start_cursor: cursor});
    pages = [...pages, ...(d2.results || [])];
    cursor = d2.next_cursor; hasMore = d2.has_more;
  }
  return pages;
}

// ── Notion 페이지 → 텍스트 추출 헬퍼 ──
function getText(p){
  if(!p) return '';
  if(p.type==='title')    return (p.title||[]).map(t=>t.plain_text||'').join('');
  if(p.type==='rich_text')return (p.rich_text||[]).map(t=>t.plain_text||'').join('');
  if(p.type==='select')   return p.select?.name || '';
  if(p.type==='number')   return p.number ?? '';
  if(p.type==='date')     return p.date?.start?.slice(0,10) || '';
  return '';
}

// ── Notion 데이터 → DATA[] 변환 ──
function parseNotionData(sectorPages, stockPages){
  // 섹터 pageId → sector 객체 맵
  const sectorById = {};
  sectorPages.forEach(page => {
    const pr = page.properties || {};
    const key         = String(getText(pr['key'])    || '').trim();
    const name        = String(getText(pr['섹터명'])  || '').trim();
    const icon        = String(getText(pr['icon'])   || '').trim();
    const desc        = String(getText(pr['desc'])   || '').trim();
    const s_type      = String(getText(pr['strength_type']) || 'pos').trim();
    const s_txt       = String(getText(pr['strength_txt'])  || '').trim();
    const order       = Number(getText(pr['순서']) || 99);
    let glossary      = [];
    try { glossary = JSON.parse(getText(pr['glossary']) || '[]'); } catch(e){}
    if(!key || !name) return;
    sectorById[page.id] = { key, name, icon, desc,
      strength: { type: s_type, txt: s_txt },
      glossary, stages: [], _order: order };
  });

  // 종목을 섹터별·stage별로 분류
  stockPages.forEach(page => {
    const pr = page.properties || {};
    const n          = String(getText(pr['종목명'])  || '').trim();
    const code       = String(getText(pr['code'])    || '').trim();
    const tier       = Number(getText(pr['tier'])    || 3);
    const upd        = String(getText(pr['upd'])     || '').trim();
    const d          = String(getText(pr['d'])       || '').trim();
    const stage      = String(getText(pr['stage'])   || '').trim();
    const stage_sub  = String(getText(pr['stage_sub']) || '').trim();
    let history      = [];
    try { history = JSON.parse(getText(pr['history']) || '[]'); } catch(e){}
    if(!n) return;

    // 섹터 relation: JSON 배열 "[url, ...]" or Notion relation array
    let sectorId = null;
    const sectorProp = pr['섹터'];
    if(sectorProp?.type === 'relation' && sectorProp.relation?.length){
      sectorId = sectorProp.relation[0].id;
    } else if(sectorProp?.type === 'rich_text'){
      // 우리가 문자열로 넣은 경우 "["https://..."]" 파싱
      const raw = getText(sectorProp);
      try {
        const urls = JSON.parse(raw);
        const url = urls[0] || '';
        // URL에서 UUID 추출: /p/37459c8c9c0a81e8...
        const m = url.match(/\/p\/([0-9a-f]{32})/i);
        if(m) sectorId = [m[1].slice(0,8),m[1].slice(8,12),m[1].slice(12,16),m[1].slice(16,20),m[1].slice(20)].join('-');
      } catch(e){}
    }
    if(!sectorId || !sectorById[sectorId]) return;

    const sec = sectorById[sectorId];
    // stage 찾기 또는 생성
    let stageObj = sec.stages.find(s => s.t === stage);
    if(!stageObj){
      stageObj = { t: stage, s: stage_sub, stocks: [] };
      sec.stages.push(stageObj);
    }
    const stock = { n, tier, upd, d };
    if(code) stock.code = code;
    if(history.length) stock.history = history;
    // 동일 stage 내 중복 종목 방어 — 같은 종목명이 이미 있으면 upd가 더 최신인 것으로 교체
    const dupIdx = stageObj.stocks.findIndex(s => s.n === n);
    if(dupIdx === -1){
      stageObj.stocks.push(stock);
    } else if((upd || '') > (stageObj.stocks[dupIdx].upd || '')){
      stageObj.stocks[dupIdx] = stock; // 최신 upd로 교체
    }
  });

  // 섹터 순서 정렬
  return Object.values(sectorById)
    .filter(s => s.stages.length > 0)
    .sort((a, b) => a._order - b._order)
    .map(({ _order, ...s }) => {
      // ── 스테이지 자동 정렬 ──
      // 우선순위 1: stage_sub에 "최상단" 포함 → 0
      // 우선순위 2: tier1 종목 수 많은 순
      // 우선순위 3: 등장(push) 순서 유지 (_si)
      s.stages = s.stages
        .map((st, idx) => ({ ...st, _si: idx }))
        .sort((a, b) => {
          const aTop = a.s && a.s.includes('최상단') ? 0 : 1;
          const bTop = b.s && b.s.includes('최상단') ? 0 : 1;
          if (aTop !== bTop) return aTop - bTop;
          const aTier1 = a.stocks.filter(x => Number(x.tier) === 1).length;
          const bTier1 = b.stocks.filter(x => Number(x.tier) === 1).length;
          if (bTier1 !== aTier1) return bTier1 - aTier1;
          return a._si - b._si;
        })
        .map(({ _si, ...st }) => st);
      return s;
    }); // _order 제거
}

// ── 메인 데이터 로드 ──
async function loadData(){
  if(!CFG.workerUrl){
    openCfgModal();
    return;
  }
  // syncBtn 스피너
  const syncBtn=document.getElementById('syncBtn');
  const syncIcon=document.getElementById('syncIcon');
  const syncLabel=document.getElementById('syncLabel');
  if(syncBtn){ syncBtn.disabled=true; }
  if(syncIcon){ syncIcon.classList.add('spinning'); }
  if(syncLabel){ syncLabel.textContent='로딩 중...'; }
  try{
    // 1. 섹터 DB 전체 조회
    const sectorPages = await fetchAllPages(
      CFG.sectorDbId,
      [{ property:'순서', direction:'ascending' }]
    );
    // 2. 종목 DB 전체 조회
    const stockPages = await fetchAllPages(CFG.stockDbId);
    // 3. DATA[] 구성
    const newData = parseNotionData(sectorPages, stockPages);
    if(!newData.length) throw new Error('섹터 데이터가 없습니다 — DB ID를 확인하세요');
    DATA = newData;
    // 4. 탭·패널·Map 재구성
    rebuildApp();
    toast(`Notion 로드 완료 — ${sectorPages.length}개 섹터 · ${stockPages.length}개 종목`);
    updateCfgStatus('ok');
  }catch(e){
    let msg = e.message || '알 수 없는 오류';
    if(msg.includes('401')||msg.includes('403')) msg = '인증 오류 — Worker API 키 확인';
    else if(msg.includes('404')) msg = 'DB를 찾을 수 없음 — DB ID 확인';
    else if(msg.includes('Worker URL')) msg = 'Worker URL 오류 — 주소를 확인하세요';
    else if(msg.includes('Failed to fetch')) msg = '네트워크 오류 — Worker URL 확인';
    toast('⚠ ' + msg);
    updateCfgStatus('err');
  } finally {
    // 스피너 해제
    if(syncBtn){ syncBtn.disabled=false; }
    if(syncIcon){ syncIcon.classList.remove('spinning'); }
    if(syncLabel){ syncLabel.textContent='새로고침'; }
  }
}

// ── 초기 진입 ──
(function initPage(){
  try { history.replaceState(null, '', location.pathname + '#home'); } catch(e){}
  updateCfgStatus();
  // Worker URL이 있으면 자동 로드, 없으면 설정 모달
  if(CFG.workerUrl){
    loadData();
  } else {
    // 데모 데이터로 앱 구동 (설정 버튼으로 실제 DB 연결 가능)
    DATA = DEMO_DATA;
    rebuildApp();
    toast('💡 데모 모드 — DB 설정 버튼으로 Notion 연결');
  }
})();

// fixed 헤더 높이만큼 본문 상단 여백 자동 적용
function applyHeaderOffset() {
  const h = document.querySelector('.hdr-wrap');
  const m = document.querySelector('.main');
  if (h && m) m.style.paddingTop = (h.offsetHeight + 8) + 'px';
}

applyHeaderOffset();
window.addEventListener('resize', () => { applyHeaderOffset(); updateNavArrows(); });

// [버그 수정] 폰트 로드 완료 후 헤더 높이 재측정 (폰트 미로드 시 높이 오차 방지)
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => { applyHeaderOffset(); updateNavArrows(); });
}

// [개선] ResizeObserver — hdr-wrap 높이가 콘텐츠 변화로 달라질 때도 자동 재측정
if(typeof ResizeObserver !== 'undefined'){
  new ResizeObserver(() => applyHeaderOffset()).observe(document.querySelector('.hdr-wrap'));
}

// ── scrollend 폴백 공통 헬퍼 ──
function onScrollEnd(el, fn){
  if('onscrollend' in window){
    el.addEventListener('scrollend', fn, {once: true});
  } else {
    setTimeout(fn, 300);
  }
}

function updateNavArrows(){
  if(!nav || !navPrev || !navNext) return;
  const atStart = nav.scrollLeft <= 4;
  const atEnd = nav.scrollLeft >= nav.scrollWidth - nav.clientWidth - 4;
  navPrev.disabled = atStart;
  navNext.disabled = atEnd;
}

function navScroll(dir){
  if(!nav) return;
  nav.scrollBy({ left: dir * 160, behavior: 'smooth' });
  onScrollEnd(nav, updateNavArrows);
}

nav.addEventListener('scroll', updateNavArrows);
updateNavArrows();

</script>
